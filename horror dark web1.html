<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Market | Buy & Sell Thy Soul</title>
    <!-- Google Fonts for Horror Vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #8a0303;
            --blood-red: #ff0000;
            --Void-black: #050505;
            --ghost-grey: #1a1a1a;
            --bone-white: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--Void-black);
            color: var(--bone-white);
            font-family: 'Courier New', monospace; /* Typewriter vibe */
            overflow-x: hidden;
        }

        /* --- ATMOSPHERE --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000000 90%);
            pointer-events: none;
            z-index: -1;
        }

        h1, h2, h3 {
            font-family: 'Creepster', cursive;
            color: var(--blood-red);
            text-shadow: 0 0 5px var(--primary-red);
        }

        /* --- BUTTONS (The Focus) --- */
        .btn-horror {
            background: var(--Void-black);
            border: 2px solid var(--primary-red);
            color: var(--blood-red);
            padding: 10px 25px;
            font-family: 'Creepster', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        /* Button Hover Effects */
        .btn-horror:hover {
            background: var(--primary-red);
            color: var(--Void-black);
            box-shadow: 0 0 15px var(--blood-red);
            transform: scale(1.05);
        }

        /* Button Click (Active) Effect */
        .btn-horror:active {
            transform: scale(0.95) translateY(2px);
            background: #500000;
            border-color: #ff0000;
        }

        /* Input Fields */
        input, textarea, select {
            background: var(--ghost-grey);
            border: 1px solid var(--primary-red);
            color: var(--bone-white);
            padding: 10px;
            font-family: 'Courier New', monospace;
            width: 100%;
            margin-bottom: 15px;
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 10px var(--primary-red);
            border-color: var(--blood-red);
        }

        /* --- LAYOUT --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--primary-red);
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Nosifer', cursive;
            font-size: 1.5rem;
            color: var(--blood-red);
            cursor: pointer;
        }

        .nav-links button {
            margin-left: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 80vh;
        }

        /* --- SECTIONS --- */
        .section {
            display: none; /* Hidden by default */
            animation: fadeIn 1s;
        }

        .section.active {
            display: block;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            border: 1px solid var(--primary-red);
            padding: 15px;
            background: var(--ghost-grey);
            transition: transform 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(138, 3, 3, 0.5);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: sepia(100%) hue-rotate(-50deg) saturate(400%);
            margin-bottom: 10px;
        }

        .price-tag {
            color: var(--blood-red);
            font-family: 'Creepster', cursive;
            font-size: 1.5rem;
            float: right;
        }

        /* User Account Panel */
        .account-panel {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .stats-box {
            border: 1px dashed var(--primary-red);
            padding: 20px;
            text-align: center;
        }

        /* Auth Forms */
        .auth-box {
            max-width: 400px;
            margin: 50px auto;
            border: 2px solid var(--primary-red);
            padding: 30px;
            background: rgba(10, 10, 10, 0.9);
        }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(5px); }
            to { opacity: 1; filter: blur(0); }
        }

        /* Utility */
        .hidden { display: none !important; }
        .text-center { text-align: center; }

    </style>
</head>
<body>

    <!-- HEADER / NAV -->
    <nav>
        <div class="logo" onclick="app.loadView('home')">☠️ Cursed Market ☠️</div>
        <div class="nav-links" id="nav-auth-buttons">
            <!-- Injected via JS based on login status -->
        </div>
    </nav>

    <!-- MAIN CONTENT AREA -->
    <div class="container">

        <!-- 1. HOME VIEW -->
        <div id="home-view" class="section active">
            <div class="text-center" style="margin-bottom: 40px;">
                <h1 style="font-size: 4rem;">Welcome to the Underworld</h1>
                <p style="color: #888;">Here, buyers trade souls and sellers trade sins.</p>
            </div>
            <h2>Freshly Dug up Items</h2>
            <div id="product-list" class="product-grid">
                <!-- Products load here via JS -->
            </div>
        </div>

        <!-- 2. MARKET VIEW -->
        <div id="market-view" class="section">
            <h2>The Archives (All Products)</h2>
            <div id="market-list" class="product-grid"></div>
        </div>

        <!-- 3. SELL VIEW (Listing Form) -->
        <div id="sell-view" class="section">
            <div class="auth-box">
                <h2 class="text-center">Sell Your Artifact</h2>
                <form id="sell-form">
                    <label>Artifact Name (Product)</label>
                    <input type="text" id="product-name" required placeholder="e.g. Cursed Dagger">
                    
                    <label>Description</label>
                    <textarea id="product-desc" rows="4" placeholder="Where did you steal this from?"></textarea>
                    
                    <label>Price (Blood Money)</label>
                    <input type="number" id="product-price" required placeholder="0.00">
                    
                    <label>Image URL</label>
                    <input type="text" id="product-img" placeholder="https://..." value="https://images.unsplash.com/photo-1598514975278-8f4a8d11ff2c?auto=format&fit=crop&w=500&q=60">
                    
                    <button type="submit" class="btn-horror" style="width: 100%">Summon Listing</button>
                </form>
            </div>
        </div>

        <!-- 4. LOGIN / REGISTER VIEW -->
        <div id="auth-view" class="section">
            <div class="auth-box">
                <h2 class="text-center" id="auth-title">Enter The Void</h2>
                <form id="auth-form">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="btn-horror" style="width: 100%" id="auth-btn">Login</button>
                </form>
                <p class="text-center" style="margin-top:10px; cursor: pointer; color: #888;" onclick="app.toggleAuthMode()">
                    <span id="auth-switch-text">New here? Register</span>
                </p>
            </div>
        </div>

        <!-- 5. ACCOUNT VIEW (User Dashboard) -->
        <div id="account-view" class="section">
            <h1>Your Crypt</h1>
            <div class="account-panel">
                <div class="stats-box">
                    <h3>User Info</h3>
                    <p id="user-display-name" style="color:var(--blood-red)"></p>
                    <br>
                    <button class="btn-horror" onclick="app.logout()">Exorcist Logout</button>
                </div>
                <div>
                    <h3>Your Active Listings</h3>
                    <div id="my-products-list" class="product-grid"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        // Simulating a backend database in LocalStorage
        const DB = {
            getUsers: () => JSON.parse(localStorage.getItem('cm_users')) || [],
            setUsers: (users) => localStorage.setItem('cm_users', JSON.stringify(users)),
            getProducts: () => JSON.parse(localStorage.getItem('cm_products')) || [
                {id: 1, name: "Old Necronomicon", price: 500, desc: "Slightly torn.", img: "https://images.unsplash.com/photo-1623268595509-5e7f5c79214b?auto=format&fit=crop&w=500&q=60", seller: "Admin"},
                {id: 2, name: "Evil Ventriloquist Dummy", price: 150, desc: "It smiles back.", img: "https://images.unsplash.com/photo-1589820296156-2454bb8a441e?auto=format&fit=crop&w=500&q=60", seller: "Admin"}
            ],
            setProducts: (products) => localStorage.setItem('cm_products', JSON.stringify(products)),
            getCurrentUser: () => JSON.parse(localStorage.getItem('cm_current_user')),
            setCurrentUser: (user) => localStorage.setItem('cm_current_user', JSON.stringify(user))
        };

        const app = {
            isRegistering: false,

            init: () => {
                app.renderNav();
                app.renderProducts();
                
                // Event Listener for Sell Form
                document.getElementById('sell-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    app.addProduct();
                });

                // Event Listener for Login/Register Form
                document.getElementById('auth-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    app.handleAuth();
                });
            },

            // --- NAVIGATION ---
